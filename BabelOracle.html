<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover.0,maximum-scale=1.0,user-scalable=no">
<title>BABEL ORACLE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e1c;font-family:'Courier New',monospace;color:#c8c8d0;user-select:none;-webkit-user-select:none;touch-action:manipulation;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;z-index:0;touch-action:none}

/* PASSWORD OVERLAY */
#overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#080c18 0%,#0d1224 40%,#141a30 100%);transition:opacity .6s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:2.6rem;letter-spacing:.6rem;color:#f0c040;text-shadow:0 0 30px rgba(240,192,64,.3);margin-bottom:.3rem}
#overlay h2{font-size:.85rem;letter-spacing:.25rem;color:#7a7a90;margin-bottom:1.8rem;text-align:center}
#pwInput{background:#12162a;border:1px solid #2a3a5a;color:#f0c040;font-family:inherit;font-size:1.1rem;padding:.55rem 1.2rem;
  text-align:center;border-radius:4px;outline:none;width:220px;letter-spacing:.15rem}
#pwInput::placeholder{color:#4a4a60}
#pwInput:focus{border-color:#f0c040;box-shadow:0 0 12px rgba(240,192,64,.15)}
#deviceToggle{display:flex;gap:6px;margin-top:1.2rem}
.pill{padding:6px 16px;border-radius:20px;font-size:.7rem;letter-spacing:.12rem;cursor:pointer;border:1px solid #2a3a5a;background:#1a1a30;color:#7a7a90;transition:all .2s}
.pill.active{background:#2a3a5a;color:#f0c040;border-color:#f0c040}

/* FX RACK */
#fxRack{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,14,28,.92);backdrop-filter:blur(6px);
  border-top:1px solid #1a2a44;padding:6px 12px 8px;display:none;flex-direction:column;align-items:center;gap:4px}
#fxRack.show{display:flex}
.fx-row{display:flex;flex-wrap:wrap;align-items:center;gap:4px 12px;justify-content:center;width:100%}
.fx-group{display:flex;align-items:center;gap:4px}
.fx-label{font-size:.55rem;letter-spacing:.08rem;color:#7a7a90;min-width:36px}
.fx-slider{-webkit-appearance:none;appearance:none;width:100px;height:5px;background:#1a2a44;border-radius:2px;outline:none}
.fx-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#f0c040;cursor:pointer;box-shadow:0 0 6px rgba(240,192,64,.3)}
.fx-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#f0c040;cursor:pointer;border:none}
.bg-pills{display:flex;gap:3px;flex-wrap:wrap}
.bg-pill{padding:2px 7px;border-radius:8px;font-size:.5rem;cursor:pointer;border:1px solid #2a3a5a;background:#1a1a30;color:#7a7a90;letter-spacing:.05rem;-webkit-appearance:none;appearance:none;font-family:inherit}
.bg-pill.active{background:#2a3a5a;color:#f0c040;border-color:#f0c040}
.format-pill{padding:3px 10px;border-radius:12px;font-size:.6rem;cursor:pointer;border:1px solid #2a3a5a;background:#1a1a30;color:#7a7a90;transition:all .2s}
.format-pill.active{background:#2a3a5a;color:#f0c040;border-color:#f0c040}
#recBtn{width:36px;height:36px;border-radius:50%;border:2px solid #f0c040;background:#1a1a30;color:#f0c040;font-size:.7rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
#recBtn.recording{background:#8a2030;border-color:#ff4060;color:#fff;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,64,96,.4)}50%{box-shadow:0 0 0 8px rgba(255,64,96,0)}}
#recTimer{font-size:.65rem;color:#f0c040;min-width:40px;text-align:center}
@media(max-width:520px){
  .fx-slider{width:55px}
  .fx-label{min-width:28px;font-size:.48rem}
  .bg-pill{font-size:.42rem;padding:2px 5px}
}

/* VOLUME HINT */
#volHint{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:60;background:rgba(240,192,64,.12);
  border:1px solid rgba(240,192,64,.3);color:#f0c040;font-size:.65rem;padding:4px 14px;border-radius:14px;
  opacity:0;transition:opacity .4s;pointer-events:none}
#volHint.show{opacity:1}

/* HINTS BAR */
#hints{position:fixed;bottom:0;left:0;right:0;z-index:40;text-align:center;font-size:.55rem;color:#4a4a60;padding:3px;letter-spacing:.06rem;pointer-events:none}

/* SAFE AREA PROBE */
#safeProbe{position:fixed;bottom:0;left:0;width:1px;height:1px;padding-bottom:env(safe-area-inset-bottom,0px);visibility:hidden;pointer-events:none}

@media(max-width:520px){
  #overlay h1{font-size:1.6rem;letter-spacing:.3rem}
  #overlay h2{font-size:.65rem;letter-spacing:.15rem}
  #fxRack{padding:6px 8px 8px;gap:4px 8px}
  .fx-slider{width:56px}
  .fx-label{font-size:.5rem;min-width:32px}
  #recBtn{width:30px;height:30px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <h1>BABEL ORACLE</h1>
  <h2>SPEAK THE WORD TO OPEN THE GATES</h2>
  <input id="pwInput" type="password" placeholder="PASSWORD" autocomplete="off" spellcheck="false">
  <div id="deviceToggle">
    <div class="pill" data-dev="desktop">DESKTOP</div>
    <div class="pill" data-dev="mobile">MOBILE</div>
  </div>
</div>

<div id="fxRack">
  <div class="fx-row">
    <div class="fx-group"><span class="fx-label">VOICE</span><input class="fx-slider" id="slVolume" type="range" min="0" max="1" step="0.01" value="0.8"></div>
    <div class="fx-group"><span class="fx-label">HI CUT</span><input class="fx-slider" id="slHiCut" type="range" min="200" max="20000" step="100" value="20000"></div>
    <div class="fx-group"><span class="fx-label">LO CUT</span><input class="fx-slider" id="slLoCut" type="range" min="20" max="2000" step="10" value="20"></div>
    <div class="fx-group"><span class="fx-label">BG VOL</span><input class="fx-slider" id="slBgVol" type="range" min="0" max="1" step="0.01" value="0.15"></div>
    <div class="fx-group"><span class="fx-label">DRONE</span><input class="fx-slider" id="slDrone" type="range" min="0" max="0.3" step="0.005" value="0.06"></div>
  </div>
  <div class="fx-row">
    <div class="fx-group"><span class="fx-label">REVERB</span><input class="fx-slider" id="slReverb" type="range" min="0" max="1" step="0.01" value="0.3"></div>
    <div class="fx-group"><span class="fx-label">DELAY</span><input class="fx-slider" id="slDelay" type="range" min="0" max="1" step="0.01" value="0"></div>
    <div class="fx-group"><span class="fx-label">8-BIT</span><input class="fx-slider" id="slBit" type="range" min="0" max="1" step="0.01" value="0"></div>
    <div class="fx-group" id="bgTypeGroup">
      <span class="fx-label">BG</span>
      <div class="bg-pills">
        <button class="bg-pill active" data-bg="brown">BROWN</button>
        <button class="bg-pill" data-bg="pink">PINK</button>
        <button class="bg-pill" data-bg="rain">RAIN</button>
        <button class="bg-pill" data-bg="wind">WIND</button>
        <button class="bg-pill" data-bg="street">STREET</button>
        <button class="bg-pill" data-bg="night">NIGHT</button>
        <button class="bg-pill" data-bg="hum">HUM</button>
        <button class="bg-pill" data-bg="off">OFF</button>
      </div>
    </div>
  </div>
  <div class="fx-row">
    <div class="fx-group">
      <div class="format-pill active" data-fmt="wav">WAV</div>
      <div class="format-pill" data-fmt="webm">WEBM</div>
    </div>
    <button id="recBtn">REC</button>
    <span id="recTimer">00:00</span>
  </div>
</div>

<div id="volHint">VOLUME UP FOR FULL EXPERIENCE</div>
<div id="hints">SPACE=PLAY/STOP &nbsp; 1-4=MODE &nbsp; M=MUTE &nbsp; R=RECORD &nbsp; ESC=LOCK</div>
<div id="safeProbe"></div>

  muted: false,

const RECORDING_STATE = { IDLE: 0, RECORDING: 1, STOPPING: 2 };
let recState = RECORDING_STATE.IDLE;

/* Layout */
const layout = {

  btnH: 44,

  mode4Slots: 6

/* Buttons */
const buttons = [];

/* ===== HELPERS ===== */
function rnd(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

/* ===== PHONEME WORD GEN ===== */
function genSyllable(lang) {
  const p = PHONEMES[lang];
  if (!p) return 'ba';
  return pick(p.onset) + pick(p.vowel) + pick(p.coda);
}
function genWord(lang) {
  const n = 1 + Math.floor(Math.random() * 3);
  let w = '';
  for (let i = 0; i < n; i++) w += genSyllable(lang);
  return w;
}
function genSentence(lang, wordCount) {
  const p = PHONEMES[lang];
  const n = wordCount || (3 + Math.floor(Math.random() * 6));
  const words = [];
  for (let i = 0; i < n; i++) {
    if (i > 0 && p && p.connectors.length && Math.random() < 0.2) {
      words.push(pick(p.connectors));
    }
    words.push(genWord(lang));
  }
  return words.join(' ');
}

/* ===== VOICE DISCOVERY ===== */
function discoverVoices() {
  try {
    allVoices = speechSynthesis.getVoices();
  } catch(e) { allVoices = []; }
  langVoices = {};
  for (const v of allVoices) {
    const iso = (v.lang || '').substring(0, 2).toLowerCase();
    if (PHONEMES[iso]) {
      if (!langVoices[iso]) langVoices[iso] = [];
      langVoices[iso].push(v);
    }
  }
  if (Object.keys(langVoices).length === 0 && allVoices.length > 0) {
    langVoices['en'] = [allVoices[0]];
  }
}
discoverVoices();
try {
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = discoverVoices;
  }
} catch(e) {}
setTimeout(discoverVoices, 500);
setTimeout(discoverVoices, 2000);
setTimeout(discoverVoices, 5000);  // extra retry for slow mobile loading

function pickLangAndVoice() {
  const langs = Object.keys(langVoices);
  if (langs.length === 0) return null;
  const lang = pick(langs);
  const voice = pick(langVoices[lang]);
  return { lang, voice };

/* ===== SPEECH SCHEDULING ===== */
function speakText(text, voice, opts, onEnd) {
  state.speaking = true;

  if (state.mode === 7) {
    // MODE 7 ROBOT: formant synth only, strictly sequential via onended
    const pitch = 80 + Math.random() * 120;
    const synth = synthAndPlay(text, pitch, audioCtx ? audioCtx.currentTime : 0);
    if (synth.node) {
      synth.node._userOnEnded = () => { state.speaking = false; if (onEnd) onEnd(); };
    } else {
      state.speaking = false; if (onEnd) onEnd();
    }
  } else {
    // MODES 1-6: SpeechSynthesis only (goes direct to speakers)
    try {
      // iOS workaround: cancel + re-speak if queue stalls
      if (speechSynthesis.paused) { try { speechSynthesis.resume(); } catch(e2) {} }
      const utt = new SpeechSynthesisUtterance(text);
      utt.voice = voice;
      utt.lang = voice ? voice.lang : 'en';
      utt.rate = opts.rate || (0.8 + Math.random() * 0.5);
      utt.pitch = opts.pitch || (0.7 + Math.random() * 0.7);
      utt.volume = Math.min(1, state.fx.volume);
      utt.onend = () => { state.speaking = false; if (onEnd) onEnd(); };
      utt.onerror = () => { state.speaking = false; if (onEnd) onEnd(); };
      speechSynthesis.speak(utt);

      if (!window._speechKeepAlive) {

          if (speechSynthesis.speaking && speechSynthesis.paused) {

      state.speaking = false;
      if (onEnd) onEnd();
    }

function stopSpeech() {
  clearTimeout(speakTimeout);
  clearTimeout(babelTimeout);
  speakTimeout = null; babelTimeout = null;
  state.speaking = false;
  stopCity();
  try { speechSynthesis.cancel(); } catch(e) {}
}

function speakNext() {
  if (state.mode === 0) return;
  const lv = pickLangAndVoice();
  if (!lv) { discoverVoices(); speakTimeout = setTimeout(speakNext, 1000); return; }
  let text;
  if (state.mode === 1) text = genWord(lv.lang);
  else if (state.mode === 2 || state.mode === 7) text = genSentence(lv.lang);
  else if (state.mode === 3 || state.mode === 6) text = genWord(lv.lang);
  else return;

  state.currentLang = lv.lang; state.currentVoice = lv.voice.name; state.currentText = text;

  const gap = state.mode === 1 ? (800 + Math.random() * 3500)
            : (state.mode === 2 || state.mode === 7) ? (400 + Math.random() * 2200)
            : (50 + Math.random() * 250); // modes 3,6: rapid
  speakText(text, lv.voice, {}, () => {

/* PODCAST MODE */
function rollPodcastHosts() {
  const hosts = [];
  for (let i = 0; i < 2; i++) {
    const lv = pickLangAndVoice();
    if (!lv) continue;
    hosts.push({ voice: lv.voice, lang: lv.lang, rate: 0.85 + Math.random() * 0.4, pitch: 0.6 + Math.random() * 0.9 });
  }
  if (hosts.length < 2) {
    const lv = pickLangAndVoice() || { lang: 'en', voice: allVoices[0] || null };
    while (hosts.length < 2) hosts.push({ voice: lv.voice, lang: lv.lang, rate: 0.9, pitch: 1 });
  }
  return hosts;
}
function speakPodcast(idx) {
  if (state.mode !== 4) return;
  if (!state.podcastHosts || state.podcastExchanges >= 8) {
    state.podcastHosts = rollPodcastHosts();
    state.podcastExchanges = 0;
  }
  const host = state.podcastHosts[idx % 2];
  if (!host || !host.voice) { discoverVoices(); speakTimeout = setTimeout(() => speakPodcast(idx), 800); return; }
  let text = genSentence(host.lang, 3 + Math.floor(Math.random() * 3));
  if (Math.random() < 0.2) text = pick(['mm','ah','da','hmm','oh']) + ' ' + text;
  if (Math.random() < 0.3) text += '?';
  state.currentLang = host.lang; state.currentVoice = host.voice.name; state.currentText = text;
  state.podcastIndex = idx;
  const gap = 200 + Math.random() * 600;
  speakText(text, host.voice, { rate: host.rate, pitch: host.pitch }, () => {
    state.podcastExchanges++;
    if (state.mode === 4) speakTimeout = setTimeout(() => speakPodcast((idx + 1) % 2), gap);

function genCarPass(sr){const dur=1.5+Math.random()*1.5,n=Math.ceil(dur*sr),b=new Float32Array(n),p0=60+Math.random()*40;let ph=0;for(let i=0;i<n;i++){const t=i/n,env=Math.pow(Math.sin(t*Math.PI),0.5)*0.5;ph+=p0/sr;if(ph>1)ph--;b[i]=((ph*2-1)*0.3+(Math.random()*2-1)*0.15)*env;}return b;}

let cityTimeouts = [];

function scheduleCityEvent(slot) {
  if (state.mode !== 5 && state.mode !== 6) return;
  if (!audioReady) return;
  const gen = pick(CITY_GENS);
  const sr = audioCtx.sampleRate;
  const samples = gen(sr);
  const dur = samples.length / sr;
  const abuf = audioCtx.createBuffer(1, samples.length, sr);
  abuf.getChannelData(0).set(samples);
  const node = audioCtx.createBufferSource();
  node.buffer = abuf;
  const env = audioCtx.createGain();
  const t = audioCtx.currentTime;
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(0.6, t + 0.01);

  node.onended = () => { try { node.disconnect(); env.disconnect(); pan.disconnect(); } catch(e){} };

function startMode(m) {

/* ===== AUDIO FX CHAIN ===== */
const BITCRUSH_WORKLET = `
class BitcrushProcessor extends AudioWorkletProcessor {
  static get parameterDescriptors() {
    return [{ name: 'bits', defaultValue: 16, minValue: 1, maxValue: 16 }];
  }
  process(inputs, outputs, params) {
    const input = inputs[0];
    const output = outputs[0];
    const bits = params.bits[0] || 16;
    const step = Math.pow(0.5, bits);
    for (let ch = 0; ch < input.length; ch++) {
      const inp = input[ch];
      const out = output[ch];
      for (let i = 0; i < inp.length; i++) {
        out[i] = step * Math.floor(inp[i] / step + 0.5);
      }
    }
    return true;
  }
}
registerProcessor('bitcrush-processor', BitcrushProcessor);
`;

function makeSoftClipCurve(n) {
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / (n - 1) - 1;
    if (Math.abs(x) < 0.7) {
      curve[i] = x;
    } else {
      curve[i] = Math.tanh((x - Math.sign(x) * 0.7) * 3) * 0.3 + Math.sign(x) * 0.7;
    }
  }
  return curve;
}

function makeBitcrushCurve(n) {
  const curve = new Float32Array(n);
  const steps = 16;
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / (n - 1) - 1;
    curve[i] = Math.round(x * steps) / steps;
  }
  return curve;
}

function makeReverbIR(ctx, duration, decay) {
  const len = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

async function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
  } catch(e) { return; }

  // Voice bus (entry)
  voiceBus = audioCtx.createGain();
  voiceBus.gain.value = 1;

  // Bitcrush path: worklet or waveshaper fallback
  bitcrushWet = audioCtx.createGain();
  bitcrushWet.gain.value = 0;
  bitcrushDry = audioCtx.createGain();
  bitcrushDry.gain.value = 1;
  bitcrushAAFilter = audioCtx.createBiquadFilter();
  bitcrushAAFilter.type = 'lowpass';
  bitcrushAAFilter.frequency.value = 12000;

    const blob = new Blob([BITCRUSH_WORKLET], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    await audioCtx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    bitcrushWorklet = new AudioWorkletNode(audioCtx, 'bitcrush-processor');
    voiceBus.connect(bitcrushWorklet);
    bitcrushWorklet.connect(bitcrushAAFilter);
    bitcrushAAFilter.connect(bitcrushWet);

  delayWet.gain.value = 0;

  delayDry.gain.value = 1;

  delayAAFilter.connect(delayFeedback);

  // Soft clipper
  softClipper = audioCtx.createWaveShaper();
  softClipper.curve = makeSoftClipCurve(8192);
  softClipper.oversample = '4x';
  masterGain.connect(softClipper);

  // Stereo/Mono paths
  stereoPath = audioCtx.createGain();
  stereoPath.gain.value = 1;
  monoPath = audioCtx.createGain();
  monoPath.gain.value = 0;
  monoSplitter = audioCtx.createChannelSplitter(2);
  monoMerger = audioCtx.createChannelMerger(2);

  softClipper.connect(stereoPath);
  softClipper.connect(monoSplitter);
  monoSplitter.connect(monoMerger, 0, 0);
  monoSplitter.connect(monoMerger, 0, 1);
  monoMerger.connect(monoPath);

  const stereoMono = audioCtx.createGain();
  stereoPath.connect(stereoMono);
  monoPath.connect(stereoMono);

  // Hi-cut (lowpass) and Lo-cut (highpass) EQ
  state._hicutNode = audioCtx.createBiquadFilter();
  state._hicutNode.type = 'lowpass';
  state._hicutNode.frequency.value = state.fx.hicut;
  state._hicutNode.Q.value = 0.707;
  state._locutNode = audioCtx.createBiquadFilter();
  state._locutNode.type = 'highpass';
  state._locutNode.frequency.value = state.fx.locut;
  state._locutNode.Q.value = 0.707;
  stereoMono.connect(state._hicutNode);
  state._hicutNode.connect(state._locutNode);

  // Compressor
  compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -3;
  compressor.knee.value = 6;
  compressor.ratio.value = 8;
  compressor.attack.value = 0.003;
  compressor.release.value = 0.25;
  state._locutNode.connect(compressor);

  // Analyser
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  compressor.connect(analyser);
  analyser.connect(audioCtx.destination);

  // Stream destination for recording
  try {
    streamDest = audioCtx.createMediaStreamDestination();
    compressor.connect(streamDest);
  } catch(e) { streamDest = null; }

  // Ambience: switchable noise types → filter → dedicated gain → voiceBus
  state._noiseFilter = audioCtx.createBiquadFilter();
  state._noiseFilter.type = 'lowpass';
  state._noiseFilter.frequency.value = 200;
  state._noiseFilter.Q.value = 3;
  ambienceGain = audioCtx.createGain();
  ambienceGain.gain.value = state.fx.bgVol;
  state._noiseFilter.connect(ambienceGain);
  ambienceGain.connect(voiceBus);

  function makeNoiseBuf(type) {
    const sr = audioCtx.sampleRate;
    const len = sr * 2;
    const buf = audioCtx.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    if (type === 'brown') {
      let v = 0;
      for (let i = 0; i < len; i++) { v = (v + 0.02 * (Math.random()*2-1)) / 1.02; d[i] = v * 3.5; }
    } else if (type === 'white') {
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * 0.5;
    } else if (type === 'pink') {
      let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
      for (let i = 0; i < len; i++) {
        const w = (Math.random()*2-1)*0.5;
        b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
        d[i] = Math.max(-1,Math.min(1,(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.18));
        b6 = w * 0.115926;
      }
    } else if (type === 'crackle') {
      for (let i = 0; i < len; i++) d[i] = Math.random() < 0.003 ? (Math.random()*2-1)*0.8 : 0;
    } else if (type === 'rain') {
      // Bandpass-filtered noise ~2-6kHz: gentle patter. Add occasional louder drops.
      let b0=0, b1=0;
      for (let i = 0; i < len; i++) {
        const w = Math.random()*2-1;
        b0 = 0.85*b0 + w*0.15; // soft lowpass
        const bp = w - b0; // crude highpass residual = rain shimmer
        const drop = Math.random() < 0.001 ? (Math.random()*0.8) : 0; // random loud drops
        d[i] = Math.max(-1, Math.min(1, bp * 0.35 + drop));
      }
    } else if (type === 'wind') {
      // Slowly modulated low-frequency noise with gentle swell
      let v=0;
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const mod = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(2*Math.PI*0.15*t + Math.sin(2*Math.PI*0.07*t)*2));
        v = (v + 0.03 * (Math.random()*2-1)) / 1.03;
        d[i] = v * mod * 2.5;
      }
    } else if (type === 'street') {
      // Low rumble + sparse horn-like pings + distant hiss
      let v=0;
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        v = (v + 0.015 * (Math.random()*2-1)) / 1.015;
        const rumble = v * 3;
        const horn = Math.random() < 0.0002 ? Math.sin(2*Math.PI*(300+Math.random()*200)*t)*0.4 : 0;
        const hiss = (Math.random()*2-1) * 0.04;
        d[i] = Math.max(-1, Math.min(1, rumble + horn + hiss));
      }
    } else if (type === 'night') {
      // Very soft noise + cricket-like periodic chirps
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const soft = (Math.random()*2-1) * 0.03;
        // crickets: burst of ~4kHz sine, periodic every ~0.7s, on for ~0.1s
        const cricketPhase = (t % 0.7);
        const cricket = cricketPhase < 0.08 ? Math.sin(2*Math.PI*4200*t) * 0.12 * (1 - cricketPhase/0.08) : 0;
        // second cricket offset
        const cp2 = ((t + 0.35) % 0.9);
        const cricket2 = cp2 < 0.06 ? Math.sin(2*Math.PI*3800*t) * 0.08 * (1 - cp2/0.06) : 0;
        d[i] = soft + cricket + cricket2;
      }
    } else if (type === 'hum') {
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        d[i] = (Math.sin(2*Math.PI*50*t)*0.3 + Math.sin(2*Math.PI*100*t)*0.15 +
                Math.sin(2*Math.PI*150*t)*0.08 + Math.sin(2*Math.PI*200*t)*0.04) * 0.5;
      }
    } else { // 'off'
      // silence
    }
    return buf;
  }
  state._makeNoiseBuf = makeNoiseBuf;

  const NOISE_FILTER_FREQ = {
    brown: 200, pink: 800, rain: 6000, wind: 300, street: 400,
    night: 18000, hum: 18000, white: 18000
  };
  function setNoiseType(type) {
    try {
      if (noiseSource) { noiseSource.stop(); noiseSource.disconnect(); }
    } catch(e) {}
    if (type === 'off') { noiseSource = null; return; }
    const buf = makeNoiseBuf(type);
    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = buf;
    noiseSource.loop = true;
    noiseSource.connect(state._noiseFilter);  // noise → filter → ambienceGain → voiceBus
    const cutoff = NOISE_FILTER_FREQ[type] || 200;
    state._noiseFilter.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.02);
    noiseSource.start();
  }
  state._setNoiseType = setNoiseType;
  setNoiseType(state.fx.bgType);

  // Original v1 sine drone: 60 Hz oscillator + slow LFO tremolo (persistent)
  try {
    sineOsc = audioCtx.createOscillator();
    sineOsc.type = 'sine';
    sineOsc.frequency.value = 60;
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.3;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.5;
    lfo.connect(lfoGain);
    sineGain = audioCtx.createGain();
    sineGain.gain.value = state.fx.drone;
    lfoGain.connect(sineGain.gain);
    sineOsc.connect(sineGain);
    sineGain.connect(voiceBus);
    sineOsc.start();
    lfo.start();
  } catch(e) {}

  audioReady = true;
  applyFx();
}

function applyFx() {
  if (!audioReady) return;
  const t = audioCtx.currentTime;
  const tc = 0.02;
  // FX chain (processes background noise + drone only — speech bypasses Web Audio)
  reverbWet.gain.setTargetAtTime(state.fx.reverb, t, tc);
  reverbDry.gain.setTargetAtTime(1 - state.fx.reverb * 0.5, t, tc);
  state._delayWet.gain.setTargetAtTime(state.fx.delay, t, tc);
  state._delayDry.gain.setTargetAtTime(1 - state.fx.delay * 0.3, t, tc);
  bitcrushWet.gain.setTargetAtTime(state.fx.bit, t, tc);
  bitcrushDry.gain.setTargetAtTime(1 - state.fx.bit, t, tc);
  if (bitcrushWorklet) {
    const bitsVal = 16 - state.fx.bit * 12;
    try { bitcrushWorklet.parameters.get('bits').setTargetAtTime(bitsVal, t, tc); } catch(e){}
  }
  // Hi-cut / Lo-cut EQ
  if (state._hicutNode) state._hicutNode.frequency.setTargetAtTime(state.fx.hicut, t, tc);
  if (state._locutNode) state._locutNode.frequency.setTargetAtTime(state.fx.locut, t, tc);
  // Background noise volume (independent of speech VOICE slider)
  if (ambienceGain) ambienceGain.gain.setTargetAtTime(state.fx.bgVol, t, tc);
  // Drone volume (independent)
  if (sineGain) sineGain.gain.setTargetAtTime(state.fx.drone, t, tc);
  persistFx();
}

function persistFx() {
  try { localStorage.setItem('babel_fx', JSON.stringify(state.fx)); } catch(e) {}
}
function loadFx() {
  try {
    const d = JSON.parse(localStorage.getItem('babel_fx'));
    if (d) {
      state.fx.volume = d.volume != null ? d.volume : 1;
      state.fx.reverb = d.reverb != null ? d.reverb : 0.3;
      state.fx.delay = d.delay != null ? d.delay : 0;
      state.fx.bit = d.bit != null ? d.bit : 0;
      state.fx.hicut = d.hicut != null ? d.hicut : 20000;
      state.fx.locut = d.locut != null ? d.locut : 20;
      state.fx.bgVol = d.bgVol != null ? d.bgVol : 0.15;
      state.fx.bgType = d.bgType || 'brown';
      state.fx.drone = d.drone != null ? d.drone : 0.06;
    }
  } catch(e) {}
}
function syncSlidersFromState() {
  try {
    const m = { slVolume:'volume', slReverb:'reverb', slDelay:'delay', slBit:'bit',
                slHiCut:'hicut', slLoCut:'locut', slBgVol:'bgVol', slDrone:'drone' };
    for (const [id, key] of Object.entries(m)) {
      const el = document.getElementById(id);
      if (el) el.value = state.fx[key];
    }
    document.querySelectorAll('.bg-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.bg === state.fx.bgType);
    });
  } catch(e) {}
}

/* ===== RECORDING ===== */
function encodeWavBlob(buffers, sampleRate) {
  const numChannels = 2;
  const totalSamples = buffers[0].length;
  const bytesPerSample = 2;
  const dataSize = totalSamples * numChannels * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
  view.setUint16(32, numChannels * bytesPerSample, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);
  let offset = 44;
  for (let i = 0; i < totalSamples; i++) {
    for (let ch = 0; ch < numChannels; ch++) {
      const s = Math.max(-1, Math.min(1, buffers[ch] ? buffers[ch][i] : buffers[0][i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      offset += 2;
    }
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function startRecording() {
  if (recState !== RECORDING_STATE.IDLE || !audioCtx) return;
  recState = RECORDING_STATE.RECORDING;
  recStartTime = Date.now();
  recTimerInterval = setInterval(updateRecTimer, 200);
  document.getElementById('recBtn').classList.add('recording');

  if (state.recFormat === 'wav') {
    // ScriptProcessor tap
    wavBuffers = [[], []];
    try {
      wavProcessor = audioCtx.createScriptProcessor(4096, 2, 2);
      wavProcessor.onaudioprocess = (e) => {
        if (recState !== RECORDING_STATE.RECORDING) return;
        wavBuffers[0].push(new Float32Array(e.inputBuffer.getChannelData(0)));
        wavBuffers[1].push(new Float32Array(e.inputBuffer.getChannelData(1)));
      };
      compressor.connect(wavProcessor);
      wavProcessor.connect(audioCtx.destination);
    } catch(e) { recState = RECORDING_STATE.IDLE; }
  } else {
    // WEBM MediaRecorder
    if (!streamDest || typeof MediaRecorder === 'undefined') { recState = RECORDING_STATE.IDLE; return; }
    recChunks = [];
    try {
      mediaRecorder = new MediaRecorder(streamDest.stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        const blob = new Blob(recChunks, { type: 'audio/webm' });
        downloadBlob(blob, 'webm');
        recState = RECORDING_STATE.IDLE;
      };
      mediaRecorder.start();
    } catch(e) { recState = RECORDING_STATE.IDLE; }
  }
}

function stopRecording() {
  if (recState !== RECORDING_STATE.RECORDING) return;
  recState = RECORDING_STATE.STOPPING;
  clearInterval(recTimerInterval);
  document.getElementById('recBtn').classList.remove('recording');

  if (state.recFormat === 'wav') {
    if (wavProcessor) {
      wavProcessor.disconnect();
      wavProcessor = null;
    }
    // Merge buffers
    const totalLen = wavBuffers[0].reduce((s, b) => s + b.length, 0);
    const merged = [new Float32Array(totalLen), new Float32Array(totalLen)];
    let off = 0;
    for (let i = 0; i < wavBuffers[0].length; i++) {
      merged[0].set(wavBuffers[0][i], off);
      merged[1].set(wavBuffers[1][i], off);
      off += wavBuffers[0][i].length;
    }
    const blob = encodeWavBlob(merged, audioCtx.sampleRate);
    downloadBlob(blob, 'wav');
    recState = RECORDING_STATE.IDLE;
  } else {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      recState = RECORDING_STATE.IDLE;
    }
  }
}

function downloadBlob(blob, ext) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
  a.href = url;
  a.download = `BabelOracle_${ts}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function toggleRecording() {
  if (recState === RECORDING_STATE.IDLE) startRecording();
  else if (recState === RECORDING_STATE.RECORDING) stopRecording();
}

function updateRecTimer() {
  const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('recTimer').textContent = m + ':' + s;
}

/* ===== INIT STARS / WINDOWS ===== */
function initScene() {
  stars = [];
  for (let i = 0; i < 40; i++) {
    const seed = i * 7919 + 1;
    stars.push({
      x: ((seed * 13) % 900),
      y: ((seed * 7) % 300),
      size: 0.5 + (seed % 3) * 0.5,
      alpha: 0.3 + ((seed * 3) % 7) / 10
    });
  }
  // Building windows: 2 buildings x 6 wide x 8 tall
  windowStates = [];
  for (let b = 0; b < 2; b++) {
    const bw = [];
    for (let r = 0; r < 8; r++) {
      const row = [];
      for (let c = 0; c < 6; c++) {
        row.push(Math.random() < 0.4);
      }
      bw.push(row);
    }
    windowStates.push(bw);
  }
  // Neighbor figures in windows
  neighborFigures = [];
  for (let b = 0; b < 2; b++) {
    for (let i = 0; i < 3; i++) {
      neighborFigures.push({
        building: b,
        row: Math.floor(Math.random() * 8),
        col: Math.floor(Math.random() * 6),
        phase: Math.random() * Math.PI * 2,
        bobSpeed: 0.5 + Math.random() * 1.5
      });
    }
  }
}

/* ===== CANVAS DRAWING ===== */
function drawBackground(c, t, pulse, sw, sh) {
  c.fillStyle = '#0a0e1c';
  c.fillRect(0, 0, sw, sh);

  // Stars
  for (const s of stars) {
    const flicker = s.alpha + Math.sin(t * 2 + s.x) * 0.1;
    c.fillStyle = `rgba(255,255,240,${clamp(flicker, 0, 1)})`;
    c.beginPath();
    c.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    c.fill();
  }

  // City glow at bottom
  const glow = c.createRadialGradient(sw / 2, sh + 50, 10, sw / 2, sh + 50, sh * 0.7);
  glow.addColorStop(0, 'rgba(240,192,64,0.06)');
  glow.addColorStop(1, 'rgba(240,192,64,0)');
  c.fillStyle = glow;
  c.fillRect(0, sh * 0.3, sw, sh * 0.7);

  // Clotheslines
  c.strokeStyle = 'rgba(100,100,120,0.3)';
  c.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const y0 = 60 + i * 40;
    const x0 = 50 + i * 30;
    const x1 = sw - 50 - i * 30;
    c.beginPath();
    c.moveTo(x0, y0);
    // Catenary sag
    for (let x = x0; x <= x1; x += 10) {
      const frac = (x - x0) / (x1 - x0);
      const sag = Math.sin(frac * Math.PI) * (15 + i * 5);
      c.lineTo(x, y0 + sag);
    }
    c.stroke();

    // Hanging items
    for (let j = 0; j < 4 + i; j++) {
      const frac = 0.15 + j * 0.18;
      const hx = x0 + (x1 - x0) * frac;
      const sag = Math.sin(frac * Math.PI) * (15 + i * 5);
      const hy = y0 + sag;
      const swing = Math.sin(t * 0.8 + j * 2) * 3;
      c.fillStyle = `rgba(${140 + j * 20},${130 + j * 15},${120 + j * 10},0.4)`;
      c.save();
      c.translate(hx + swing, hy);
      c.fillRect(-3, 0, 6, 10 + j * 2);
      c.restore();
    }
  }
}

function drawBuilding(c, side, t, pulse, sw, sh) {
  const bIdx = side === 'left' ? 0 : 1;
  const bw = 180;
  const bh = sh - 40;
  const bx = side === 'left' ? 0 : sw - bw;
  const by = sh - bh;

  // Building body
  c.fillStyle = '#3a3a4a';
  c.fillRect(bx, by, bw, bh);

  // Roof edge
  c.fillStyle = '#2a2a38';
  c.fillRect(bx, by, bw, 6);

  // Windows
  const wCols = 6, wRows = 8;
  const ww = 16, wh = 20;
  const gapX = (bw - 20) / wCols;
  const gapY = (bh - 30) / wRows;

  for (let r = 0; r < wRows; r++) {
    for (let col = 0; col < wCols; col++) {
      // Flicker
      if (Math.random() < 0.005) {
        windowStates[bIdx][r][col] = !windowStates[bIdx][r][col];
      }
      // Pulse makes more windows light
      if (pulse > 0.5 && !windowStates[bIdx][r][col] && Math.random() < 0.01 * pulse) {
        windowStates[bIdx][r][col] = true;
      }

      const wx = bx + 10 + col * gapX;
      const wy = by + 15 + r * gapY;
      const lit = windowStates[bIdx][r][col];

      if (lit) {
        const warmAlpha = 0.5 + Math.sin(t * 0.5 + r + col * 3) * 0.15 + pulse * 0.15;
        c.fillStyle = `rgba(240,192,64,${clamp(warmAlpha, 0.2, 0.9)})`;
        // Window glow
        c.shadowColor = 'rgba(240,192,64,0.2)';
        c.shadowBlur = 6;
      } else {
        c.fillStyle = 'rgba(20,20,35,0.8)';
        c.shadowBlur = 0;
      }
      c.fillRect(wx, wy, ww, wh);
      c.shadowBlur = 0;

      // Window frame
      c.strokeStyle = 'rgba(60,60,80,0.5)';
      c.lineWidth = 0.5;
      c.strokeRect(wx, wy, ww, wh);
      // Cross divider
      c.beginPath();
      c.moveTo(wx + ww / 2, wy);
      c.lineTo(wx + ww / 2, wy + wh);
      c.moveTo(wx, wy + wh / 2);
      c.lineTo(wx + ww, wy + wh / 2);
      c.stroke();
    }
  }
}

function drawBalcony(c, cx, cy, sw, sh) {
  const bw = 200, bh = 15;
  const rx = cx - bw / 2;
  const ry = cy;

  // Floor
  c.fillStyle = '#4a4a58';
  c.fillRect(rx, ry, bw, bh);
  // Tile grid
  c.strokeStyle = 'rgba(80,80,100,0.3)';
  c.lineWidth = 0.5;
  for (let i = 0; i < 10; i++) {
    c.beginPath();
    c.moveTo(rx + i * 20, ry);
    c.lineTo(rx + i * 20, ry + bh);
    c.stroke();
  }

  // Railing
  const railY = ry - 35;
  c.strokeStyle = '#5a5a6a';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(rx, railY);
  c.lineTo(rx + bw, railY);
  c.stroke();
  // Posts
  c.lineWidth = 1.5;
  for (let i = 0; i <= 8; i++) {
    const px = rx + i * (bw / 8);
    c.beginPath();
    c.moveTo(px, railY);
    c.lineTo(px, ry);
    c.stroke();
  }

  // Potted plant (left)
  c.fillStyle = '#5a3a20';
  c.fillRect(rx + 15, ry - 12, 14, 12); // pot
  c.fillStyle = '#3a7a3a';
  c.beginPath();
  c.moveTo(rx + 22, ry - 32);
  c.lineTo(rx + 12, ry - 12);
  c.lineTo(rx + 32, ry - 12);
  c.closePath();
  c.fill();

  // Tipped coffee mug (right)
  c.save();
  c.translate(rx + bw - 30, ry - 5);
  c.rotate(Math.PI / 6);
  c.fillStyle = '#8a6a4a';
  c.fillRect(-5, -4, 12, 8);
  // handle
  c.strokeStyle = '#8a6a4a';
  c.lineWidth = 1.5;
  c.beginPath();
  c.arc(8, 0, 4, -Math.PI / 2, Math.PI / 2);
  c.stroke();
  c.restore();
}

function drawNeighbor(c, cx, cy, pulse, t, speaking) {
  // Suffering level scales with mode (1=mild, 7=extreme)
  const suf = Math.min(1, (state.mode || 1) / 7);
  const S = 1.4; // overall scale-up
  const sway = Math.sin(t * 0.7) * (3 + suf * 4) + Math.sin(t * 1.3) * (1.5 + suf * 2);
  const headTilt = Math.sin(t * 0.5) * (0.04 + suf * 0.06) + (speaking ? Math.sin(t * 4) * 0.05 : 0);
  const bodyLean = Math.sin(t * 0.4) * (2 + suf * 4);
  const hunch = suf * 8; // higher mode = more hunched

  c.save();
  c.translate(cx + sway, cy + bodyLean + hunch);
  c.rotate(headTilt);
  c.scale(S, S);

  // Dark pants
  c.fillStyle = '#2a2a3a';
  c.fillRect(-18, 30, 36, 35);

  // Body/shirt — darker at higher suffering
  const shirtR = Math.floor(90 - suf * 30);
  const shirtG = Math.floor(106 - suf * 40);
  c.fillStyle = `rgb(${shirtR},${shirtG},128)`;
  c.beginPath();
  c.moveTo(-22, -5 + hunch/S);
  c.lineTo(-18, 30);
  c.lineTo(18, 30);
  c.lineTo(22, -5 + hunch/S);
  c.closePath();
  c.fill();

  // Arms
  const tremble = Math.sin(t * (8 + suf * 12)) * (pulse + suf) * 3;

  // Left arm — hanging limp, more drooped at higher suffering
  c.strokeStyle = '#d4a574';
  c.lineWidth = 6;
  c.beginPath();
  c.moveTo(-22, 0);
  c.lineTo(-26 - suf * 4, 18 + suf * 6);
  c.lineTo(-22, 32 + suf * 5 + Math.sin(t * 0.9) * 1.5);
  c.stroke();
  c.fillStyle = '#d4a574';
  c.beginPath();
  c.arc(-22, 33 + suf * 5 + Math.sin(t * 0.9) * 1.5, 5, 0, Math.PI * 2);
  c.fill();

  // Right arm — gripping head harder at higher suffering
  c.strokeStyle = '#d4a574';
  c.beginPath();
  c.moveTo(22, 0);
  c.lineTo(34 - tremble, -18 - suf * 4);
  c.lineTo(24 - tremble, -36 - suf * 2);
  c.stroke();
  c.fillStyle = '#d4a574';
  c.beginPath();
  c.arc(24 - tremble, -38 - suf * 2, 6, 0, Math.PI * 2);
  c.fill();

  // Head
  c.fillStyle = '#d4a574';
  c.beginPath();
  c.arc(0, -34, 22, 0, Math.PI * 2);
  c.fill();

  // Dark circles under eyes — deeper at higher suffering
  if (suf > 0.15) {
    const dcAlpha = 0.2 + suf * 0.4;
    c.fillStyle = `rgba(60,30,60,${dcAlpha})`;
    c.beginPath(); c.ellipse(-9, -28, 7, 3 + suf * 2, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(9, -28, 7, 3 + suf * 2, 0, 0, Math.PI * 2); c.fill();
  }

  // Hair - messier at higher suffering
  c.strokeStyle = '#3a2a1a';
  c.lineWidth = 2.5;
  const hairCount = 4 + Math.floor(suf * 4);
  for (let i = -hairCount; i <= hairCount; i++) {
    const hx = i * 3.5;
    const wild = 0.15 + suf * 0.4;
    const angle = (i * 0.3) + Math.sin(t * (2 + suf * 3) + i) * wild;
    c.beginPath();
    c.moveTo(hx, -52);
    c.lineTo(hx + Math.sin(angle) * (6 + suf * 6), -62 - Math.abs(i) * 2 - suf * 4);
    c.stroke();
  }

  // Eyes — RED with glow
  const redIntensity = 0.5 + suf * 0.5; // more red at higher modes
  const pupilJitter = (pulse + suf) * 2;

  // Eye glow (red aura)
  c.save();
  c.globalCompositeOperation = 'lighter';
  const glowR = Math.floor(200 + suf * 55);
  const glowAlpha = 0.1 + suf * 0.2 + pulse * 0.1;
  c.fillStyle = `rgba(${glowR},30,20,${glowAlpha})`;
  c.beginPath(); c.arc(-9, -35, 12 + suf * 4, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.arc(9, -35, 12 + suf * 4, 0, Math.PI * 2); c.fill();
  c.restore();

  // Left eye — bloodshot sclera
  const veinR = Math.floor(220 + suf * 35);
  const scleraR = Math.floor(230 + suf * 25);
  c.fillStyle = `rgb(${scleraR},${220 - Math.floor(suf * 80)},${220 - Math.floor(suf * 100)})`;
  c.beginPath(); c.ellipse(-9, -35, 6, 5, 0, 0, Math.PI * 2); c.fill();
  // Blood veins
  if (suf > 0.2) {
    c.strokeStyle = `rgba(${veinR},40,40,${suf * 0.6})`;
    c.lineWidth = 0.5 + suf * 0.5;
    for (let v = 0; v < 3; v++) {
      c.beginPath(); c.moveTo(-9, -35);
      c.lineTo(-9 + Math.cos(v*2.1)*5, -35 + Math.sin(v*2.1)*4);
      c.stroke();
    }
  }
  // Red iris
  c.fillStyle = `rgb(${Math.floor(180+suf*75)},${Math.floor(40-suf*30)},${Math.floor(30-suf*20)})`;
  c.beginPath();
  c.arc(-9 + Math.sin(t) * pupilJitter, -35 - Math.cos(t * 1.3) * pupilJitter * 0.5, 2.5, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#000';
  c.beginPath();
  c.arc(-9 + Math.sin(t) * pupilJitter, -35 - Math.cos(t * 1.3) * pupilJitter * 0.5, 1.2, 0, Math.PI * 2);
  c.fill();

  // Right eye — same
  c.fillStyle = `rgb(${scleraR},${220 - Math.floor(suf * 80)},${220 - Math.floor(suf * 100)})`;
  c.beginPath(); c.ellipse(9, -35, 6, 5, 0, 0, Math.PI * 2); c.fill();
  if (suf > 0.2) {
    c.strokeStyle = `rgba(${veinR},40,40,${suf * 0.6})`;
    c.lineWidth = 0.5 + suf * 0.5;
    for (let v = 0; v < 3; v++) {
      c.beginPath(); c.moveTo(9, -35);
      c.lineTo(9 + Math.cos(v*2.5+1)*5, -35 + Math.sin(v*2.5+1)*4);
      c.stroke();
    }
  }
  c.fillStyle = `rgb(${Math.floor(180+suf*75)},${Math.floor(40-suf*30)},${Math.floor(30-suf*20)})`;
  c.beginPath();
  c.arc(9 + Math.sin(t * 1.1) * pupilJitter, -35 - Math.cos(t * 0.9) * pupilJitter * 0.5, 2.5, 0, Math.PI * 2);
  c.fill();
  c.fillStyle = '#000';
  c.beginPath();
  c.arc(9 + Math.sin(t * 1.1) * pupilJitter, -35 - Math.cos(t * 0.9) * pupilJitter * 0.5, 1.2, 0, Math.PI * 2);
  c.fill();

  // Eyebrows — more angry/desperate at higher modes
  c.strokeStyle = '#3a2a1a';
  c.lineWidth = 3;
  const browAngle = 2 + suf * 4;
  c.beginPath(); c.moveTo(-15, -42 - suf * 2); c.lineTo(-5, -40 - browAngle); c.stroke();
  c.beginPath(); c.moveTo(15, -42 - suf * 2); c.lineTo(5, -40 - browAngle); c.stroke();

  // Sweat drops at higher modes
  if (suf > 0.3) {
    const drops = Math.floor(suf * 4);
    c.fillStyle = `rgba(150,200,255,${0.3 + suf * 0.4})`;
    for (let d = 0; d < drops; d++) {
      const dx = -14 + d * 10 + Math.sin(t * 2 + d) * 3;
      const dy = -20 + Math.sin(t * 1.5 + d * 1.7) * 4 + d * 2;
      c.beginPath(); c.ellipse(dx, dy, 1.5, 2.5, 0, 0, Math.PI * 2); c.fill();
    }
  }

  // Mouth — more distressed at higher modes
  const mouthW = 6 + suf * 4 + pulse * 2;
  const mouthH = speaking ? (5 + pulse * 4 + suf * 3 + Math.sin(t * 12) * 3) : (2 + suf * 3);
  c.fillStyle = suf > 0.5 ? '#6a1a1a' : '#8a3a3a';
  c.beginPath();
  c.ellipse(0, -22, mouthW, mouthH, 0, 0, Math.PI * 2);
  c.fill();
  // Teeth gritting at high suffering
  if (suf > 0.5 && !speaking) {
    c.fillStyle = '#ddd';
    c.fillRect(-4, -23, 8, 2);
  }

  c.restore();
}

function drawBoombox(c, cx, cy, hue, pulse, t) {
  const shake = Math.sin(t * 15) * pulse * 2;

  c.save();
  c.translate(cx + shake, cy + Math.abs(shake) * 0.3);

  // Halo glow
  const haloAlpha = 0.05 + pulse * 0.08;
  const grad = c.createRadialGradient(0, 0, 10, 0, 0, 50);
  grad.addColorStop(0, `hsla(${hue},80%,60%,${haloAlpha})`);
  grad.addColorStop(1, `hsla(${hue},80%,60%,0)`);
  c.fillStyle = grad;
  c.fillRect(-50, -50, 100, 100);

  // Cabinet
  c.fillStyle = '#1a1a22';
  const cbw = 60, cbh = 35;
  c.beginPath();
  c.roundRect(-cbw / 2, -cbh / 2, cbw, cbh, 5);
  c.fill();
  c.strokeStyle = '#3a3a4a';
  c.lineWidth = 1;
  c.stroke();

  // Left cone
  drawSpeakerCone(c, -15, 0, 12, hue, pulse, t);
  // Right cone
  drawSpeakerCone(c, 15, 0, 12, hue, pulse, t);

  c.restore();
}

function drawSpeakerCone(c, x, y, r, hue, pulse, t) {
  // Outer ring
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fillStyle = `hsla(${hue},60%,30%,0.8)`;
  c.fill();
  c.strokeStyle = `hsla(${hue},70%,50%,0.6)`;
  c.lineWidth = 1;
  c.stroke();

  // Inner cone
  const ir = r * (0.5 + pulse * 0.15);
  c.beginPath();
  c.arc(x, y, ir, 0, Math.PI * 2);
  c.fillStyle = `hsla(${hue},80%,50%,${0.4 + pulse * 0.3})`;
  c.fill();

  // Center dot
  c.beginPath();
  c.arc(x, y, 2, 0, Math.PI * 2);
  c.fillStyle = `hsla(${hue},90%,70%,0.8)`;
  c.fill();
}

/* ===== PARTICLES ===== */
function emitPaper(x, y) {
  if (particles.length >= layout.particleMax) return;
  particles.push({
    type: 'paper',
    x, y,
    vx: rnd(-1, 1),
    vy: rnd(-0.5, 1.5),
    rot: rnd(0, Math.PI * 2),
    rotSpeed: rnd(-2, 2),
    life: 1,
    decay: rnd(0.003, 0.006),
    w: rnd(6, 12),
    h: rnd(8, 16),
    color: Math.random() < 0.5 ? '#e8dcc8' : '#d8cbb8'
  });
}

function emitMoth() {
  if (moths.length >= 15) return;
  moths.push({
    cx: SW / 2 + rnd(-50, 50),
    cy: 60 + rnd(-20, 20),
    angle: rnd(0, Math.PI * 2),
    radius: rnd(15, 45),
    speed: rnd(0.5, 2),
    noisePhase: rnd(0, 100),
    life: 1,
    decay: rnd(0.001, 0.003)
  });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.rotSpeed * dt;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = moths.length - 1; i >= 0; i--) {
    const m = moths[i];
    m.angle += m.speed * dt;
    m.noisePhase += dt * 0.5;
    m.life -= m.decay;
    if (m.life <= 0) moths.splice(i, 1);
  }
}

function drawParticles(c) {
  for (const p of particles) {
    c.save();
    c.globalAlpha = p.life;
    c.translate(p.x, p.y);
    c.rotate(p.rot);
    c.fillStyle = p.color;
    c.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    c.restore();
  }
  c.globalAlpha = 1;
  for (const m of moths) {
    const mx = m.cx + Math.cos(m.angle) * m.radius + Math.sin(m.noisePhase * 3) * 5;
    const my = m.cy + Math.sin(m.angle) * m.radius * 0.6 + Math.cos(m.noisePhase * 2) * 3;
    c.fillStyle = `rgba(255,232,160,${m.life * 0.7})`;
    c.beginPath();
    c.arc(mx, my, 1.5, 0, Math.PI * 2);
    c.fill();
    // Tiny glow
    c.fillStyle = `rgba(255,232,160,${m.life * 0.15})`;
    c.beginPath();
    c.arc(mx, my, 5, 0, Math.PI * 2);
    c.fill();
  }
}

function drawNeighborFigures(c, t, sw, sh) {
  for (const nf of neighborFigures) {
    const bw = 180;
    const bx = nf.building === 0 ? 0 : sw - bw;
    const bh = sh - 40;
    const by = sh - bh;
    const gapX = (bw - 20) / 6;
    const gapY = (bh - 30) / 8;
    const wx = bx + 10 + nf.col * gapX + 8;
    const wy = by + 15 + nf.row * gapY + 10;
    const bob = Math.sin(t * nf.bobSpeed + nf.phase) * 2;

    // Only draw if window is lit
    if (!windowStates[nf.building] || !windowStates[nf.building][nf.row] || !windowStates[nf.building][nf.row][nf.col]) continue;

    c.save();
    c.translate(wx, wy + bob);
    // Tiny head
    c.fillStyle = '#d4a574';
    c.beginPath();
    c.arc(0, -4, 3, 0, Math.PI * 2);
    c.fill();
    // Tiny body
    c.fillStyle = '#5a6a80';
    c.fillRect(-2, -1, 4, 6);
    // Arm wave
    const wave = Math.sin(t * 2 + nf.phase) * 0.5;
    c.strokeStyle = '#d4a574';
    c.lineWidth = 1;
    c.beginPath();
    c.moveTo(-2, 1);
    c.lineTo(-5, -2 + wave * 3);
    c.stroke();
    c.beginPath();
    c.moveTo(2, 1);
    c.lineTo(5, -1 + wave * 2);
    c.stroke();
    c.restore();
  }
}

/* ===== BUTTONS ===== */
const BTN_DEFS = [
  { id: 'play', label: 'PLAY' },
  { id: 'mode1', label: '1:WORDS' },
  { id: 'mode2', label: '2:SENT' },
  { id: 'mode3', label: '3:BABEL' },
  { id: 'mode4', label: '4:CAST' },
  { id: 'mode5', label: '5:CITY' },
  { id: 'mode6', label: '6:CHAOS' },
  { id: 'mode7', label: '7:ROBOT' },
  { id: 'mono', label: 'MONO' },
  { id: 'mute', label: 'MUTE' }
];

function buildButtons() {
  buttons.length = 0;
  const mobile = state.device === 'mobile';
  const perRow = mobile ? 3 : 5;
  const rows = Math.ceil(BTN_DEFS.length / perRow);
  const btnH = mobile ? 30 : 28;
  const gap = 4;
  const totalH = rows * btnH + (rows - 1) * gap;
  const baseY = SH - totalH - 4;

  for (let i = 0; i < BTN_DEFS.length; i++) {
    const row = Math.floor(i / perRow);
    const col = i % perRow;
    const itemsThisRow = Math.min(perRow, BTN_DEFS.length - row * perRow);
    const btnW = (SW - (itemsThisRow + 1) * gap) / itemsThisRow;
    const bx = gap + col * (btnW + gap);
    const by = baseY + row * (btnH + gap);
    buttons.push({ ...BTN_DEFS[i], x: bx, y: by, w: btnW, h: btnH });
  }
}

function drawButtons(c) {
  const modeLabels = { 1: 'mode1', 2: 'mode2', 3: 'mode3', 4: 'mode4', 5: 'mode5', 6: 'mode6', 7: 'mode7' };
  const activeMode = modeLabels[state.mode] || '';

  for (const b of buttons) {
    let active = false;
    if (b.id === 'play' && state.mode > 0) active = true;
    if (b.id === activeMode) active = true;
    if (b.id === 'mute' && state.muted) active = true;
    if (b.id === 'mono' && state.mono) active = true;

    c.fillStyle = active ? '#2a3a5a' : '#1a1a30';
    c.beginPath();
    c.roundRect(b.x, b.y, b.w, b.h, 6);
    c.fill();
    c.strokeStyle = active ? '#f0c040' : '#2a3a5a';
    c.lineWidth = 1;
    c.stroke();

    c.fillStyle = active ? '#f0c040' : '#7a7a90';
    c.font = 'bold 11px "Courier New", monospace';
    c.textAlign = 'center';
    c.textBaseline = 'middle';

    let label = b.label;
    if (b.id === 'play') label = state.mode > 0 ? 'STOP' : 'PLAY';
    if (b.id === 'mute') label = state.muted ? 'UNMUTE' : 'MUTE';
    if (b.id === 'mono') label = state.mono ? 'MONO' : 'STEREO';

    c.fillText(label, b.x + b.w / 2, b.y + b.h / 2);
  }
}

function drawHUD(c) {
  if (state.mode === 0) return;
  const modeNames = { 1: 'WORDS', 2: 'SENTENCES', 3: 'BABEL', 4: 'PODCAST', 5: 'CITY', 6: 'CHAOS', 7: 'ROBOT' };
  const text = `MODE: ${modeNames[state.mode] || '?'}  |  lang: ${state.currentLang.toUpperCase()}  voice: ${state.currentVoice}`;
  c.fillStyle = 'rgba(10,14,28,0.7)';
  c.fillRect(0, 0, SW, 22);
  c.fillStyle = '#7a7a90';
  c.font = '10px "Courier New", monospace';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.fillText(text, 8, 6);

  // Spoken text (truncated)
  if (state.currentText) {
    const shown = state.currentText.length > 60 ? state.currentText.substring(0, 57) + '...' : state.currentText;
    c.fillStyle = '#f0c040';
    c.font = '10px "Courier New", monospace';
    c.textAlign = 'right';
    c.fillText(`"${shown}"`, SW - 8, 6);
  }
}

/* ===== LIGHTBULB ===== */
function drawLightbulb(c, t, sw) {
  const bx = sw / 2;
  const by = 50;
  // Wire
  c.strokeStyle = '#4a4a5a';
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(bx, 0);
  c.lineTo(bx, by - 6);
  c.stroke();
  // Bulb glow
  const ga = 0.15 + Math.sin(t * 1.5) * 0.05;
  const grad = c.createRadialGradient(bx, by, 2, bx, by, 35);
  grad.addColorStop(0, `rgba(255,232,160,${ga})`);
  grad.addColorStop(1, 'rgba(255,232,160,0)');
  c.fillStyle = grad;
  c.beginPath();
  c.arc(bx, by, 35, 0, Math.PI * 2);
  c.fill();
  // Bulb
  c.fillStyle = `rgba(255,240,180,${0.6 + Math.sin(t * 2) * 0.1})`;
  c.beginPath();
  c.arc(bx, by, 4, 0, Math.PI * 2);
  c.fill();
}

/* ===== MAIN RENDER LOOP ===== */
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, layout.dprCap);
  cW = window.innerWidth;
  cH = window.innerHeight;
  canvas.width = cW * dpr;
  canvas.height = cH * dpr;
  canvas.style.width = cW + 'px';
  canvas.style.height = cH + 'px';
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);

  const barH = bottomBarHeight();
  const availH = cH - barH;
  const scaleX = cW / SW;
  const scaleY = availH / SH;
  cScale = Math.min(scaleX, scaleY);

  buildButtons();
}

function bottomBarHeight() {
  const fxRack = document.getElementById('fxRack');
  if (fxRack && fxRack.classList.contains('show')) {
    const r = fxRack.getBoundingClientRect();
    return r.height + layout.safeBottom;
  }
  return layout.safeBottom;
}

function getPulse() {
  if (!analyser) return state.speaking ? 0.5 : 0;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  return clamp(sum / (data.length * 255) * 3, 0, 1);
}

let lastTime = 0;
function render(timestamp) {
  requestAnimationFrame(render);
  const t = timestamp / 1000;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  frameCount++;

  const pulse = getPulse();

  // Transform to fit stage
  const barH = bottomBarHeight();
  const availH = cH - barH;
  const scaleX = cW / SW;
  const scaleY = availH / SH;
  const scale = Math.min(scaleX, scaleY);
  const offX = (cW - SW * scale) / 2;
  const offY = (availH - SH * scale) / 2;

  ctx2d.clearRect(0, 0, cW, cH);
  ctx2d.save();
  ctx2d.translate(offX, offY);
  ctx2d.scale(scale, scale);

  // Draw scene
  drawBackground(ctx2d, t, pulse, SW, SH);
  drawLightbulb(ctx2d, t, SW);
  drawBuilding(ctx2d, 'left', t, pulse, SW, SH);
  drawBuilding(ctx2d, 'right', t, pulse, SW, SH);
  drawNeighborFigures(ctx2d, t, SW, SH);

  // Balcony center
  const balconyY = SH - 120;
  drawBalcony(ctx2d, SW / 2, balconyY, SW, SH);

  // Boomboxes
  drawBoombox(ctx2d, SW / 2 - 70, balconyY - 20, (t * 30) % 360, pulse, t);
  drawBoombox(ctx2d, SW / 2 + 70, balconyY - 20, (t * 30 + 180) % 360, pulse, t);

  // Neighbor
  drawNeighbor(ctx2d, SW / 2, balconyY - 55, pulse, t, state.speaking);

  // Emit particles
  if (state.mode > 0) {
    if (Math.random() < 0.05 + pulse * 0.1) {
      emitPaper(SW / 2 + rnd(-20, 20), balconyY - 85);
    }
    // From random lit windows
    if (Math.random() < 0.02) {
      const b = Math.random() < 0.5 ? 0 : 1;
      const bw = 180;
      const bx = b === 0 ? 0 : SW - bw;
      emitPaper(bx + rnd(10, bw - 10), rnd(100, SH - 100));
    }
    if (Math.random() < 0.03 + pulse * 0.02) emitMoth();
  }

  updateParticles(dt);
  drawParticles(ctx2d);

  // Buttons
  drawButtons(ctx2d);
  drawHUD(ctx2d);

  ctx2d.restore();
}

  await initAudio();
}

function unlock() {
  overlay.classList.add('hidden');
  document.getElementById('fxRack').classList.add('show');
  state.unlocked = true;

  // iOS: prime SpeechSynthesis during user gesture (required for mobile Safari)
  try {
    const primer = new SpeechSynthesisUtterance('');
    primer.volume = 0;
    primer.rate = 10;
    speechSynthesis.speak(primer);
  } catch(e) {}

  // iOS: also prime AudioContext during gesture
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!audioCtx) { audioCtx = new AC(); }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}

  ensureAudio().then(() => {
    const hint = document.getElementById('volHint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 3000);
    startMode(1);
  });
}

function reLock() {
  stopSpeech();
  state.mode = 0;
  state.unlocked = false;
  overlay.classList.remove('hidden');
  document.getElementById('fxRack').classList.remove('show');
  pwInput.value = '';
  pwInput.focus();
}

pwInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (pwInput.value.toLowerCase() === 'devil') {
      unlock();
    } else {
      pwInput.value = '';
      pwInput.style.borderColor = '#8a2030';
      setTimeout(() => { pwInput.style.borderColor = ''; }, 500);
    }
  }
});

// Device toggle
const pills = document.querySelectorAll('#deviceToggle .pill');
function setDevice(dev) {
  state.device = dev;
  layout.particleMax = dev === 'mobile' ? 300 : 600;
  layout.btnRows = dev === 'mobile' ? 2 : 1;
  pills.forEach(p => p.classList.toggle('active', p.dataset.dev === dev));
  try { localStorage.setItem('babel_device', dev); } catch(e) {}
  buildButtons();
}
// Detect device
function detectDevice() {
  try {
    const saved = localStorage.getItem('babel_device');
    if (saved) return saved;
  } catch(e) {}
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? 'mobile' : 'desktop';
}
setDevice(detectDevice());
pills.forEach(p => p.addEventListener('click', () => setDevice(p.dataset.dev)));

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!state.unlocked) return;
  if (e.target === pwInput) return;
  switch(e.code) {
    case 'Space':
      e.preventDefault();
      if (state.mode > 0) startMode(0);
      else startMode(1);
      break;
    case 'Digit1': case 'Numpad1': startMode(1); break;
    case 'Digit2': case 'Numpad2': startMode(2); break;
    case 'Digit3': case 'Numpad3': startMode(3); break;
    case 'Digit4': case 'Numpad4': startMode(4); break;
    case 'Digit5': case 'Numpad5': startMode(5); break;
    case 'Digit6': case 'Numpad6': startMode(6); break;
    case 'Digit7': case 'Numpad7': startMode(7); break;
    case 'KeyM':
      state.muted = !state.muted;
      if (audioReady) masterGain.gain.setTargetAtTime(state.muted ? 0 : 1.0, audioCtx.currentTime, 0.02);
      break;
    case 'KeyR': toggleRecording(); break;
    case 'Escape': reLock(); break;
    case 'KeyF':
      try {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } catch(e2) {}
      break;
  }
});

// Canvas click/touch
function handleCanvasPointer(ex, ey) {
  if (!state.unlocked) return;
  const barH = bottomBarHeight();
  const availH = cH - barH;
  const scaleX = cW / SW;
  const scaleY = availH / SH;
  const scale = Math.min(scaleX, scaleY);
  const offX = (cW - SW * scale) / 2;
  const offY = (availH - SH * scale) / 2;
  const sx = (ex - offX) / scale;
  const sy = (ey - offY) / scale;

  for (const b of buttons) {
    if (sx >= b.x && sx <= b.x + b.w && sy >= b.y && sy <= b.y + b.h) {
      try { if (state.device === 'mobile') navigator.vibrate(20); } catch(e) {}
      handleButton(b.id);
      return;
    }
  }
}

function handleButton(id) {
  switch(id) {
    case 'play':
      if (state.mode > 0) startMode(0);
      else startMode(1);
      break;
    case 'mode1': startMode(1); break;
    case 'mode2': startMode(2); break;
    case 'mode3': startMode(3); break;
    case 'mode4': startMode(4); break;
    case 'mode5': startMode(5); break;
    case 'mode6': startMode(6); break;
    case 'mode7': startMode(7); break;
    case 'mono':
      state.mono = !state.mono;
      if (audioReady) {
        stereoPath.gain.setTargetAtTime(state.mono ? 0 : 1, audioCtx.currentTime, 0.02);
        monoPath.gain.setTargetAtTime(state.mono ? 1 : 0, audioCtx.currentTime, 0.02);
      }
      break;
    case 'mute':
      state.muted = !state.muted;
      if (audioReady) masterGain.gain.setTargetAtTime(state.muted ? 0 : 1.0, audioCtx.currentTime, 0.02);
      break;
  }
}

canvas.addEventListener('click', (e) => handleCanvasPointer(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length > 0) handleCanvasPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

// FX sliders
document.getElementById('slVolume').addEventListener('input', (e) => {
  state.fx.volume = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slReverb').addEventListener('input', (e) => {
  state.fx.reverb = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slDelay').addEventListener('input', (e) => {
  state.fx.delay = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slBit').addEventListener('input', (e) => {
  state.fx.bit = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slHiCut').addEventListener('input', (e) => {
  state.fx.hicut = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slLoCut').addEventListener('input', (e) => {
  state.fx.locut = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slBgVol').addEventListener('input', (e) => {
  state.fx.bgVol = parseFloat(e.target.value);
  applyFx();
});
document.getElementById('slDrone').addEventListener('input', (e) => {
  state.fx.drone = parseFloat(e.target.value);
  applyFx();
});

// Background noise type pills
document.querySelectorAll('.bg-pill').forEach(p => {
  p.addEventListener('click', () => {
    if (!audioReady) return;
    document.querySelectorAll('.bg-pill').forEach(q => q.classList.remove('active'));
    p.classList.add('active');
    state.fx.bgType = p.dataset.bg;
    state._setNoiseType(p.dataset.bg);
    persistFx();
  });
});

// Format pills
document.querySelectorAll('.format-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.format-pill').forEach(q => q.classList.remove('active'));
    p.classList.add('active');
    state.recFormat = p.dataset.fmt;
  });
});

// REC button
document.getElementById('recBtn').addEventListener('click', toggleRecording);

// Visibility change
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // pause speech to avoid buildup
    try { speechSynthesis.cancel(); } catch(e) {}
  } else if (state.unlocked && state.mode > 0) {
    // Resume
    if (audioCtx && audioCtx.state === 'suspended') {
      try { audioCtx.resume(); } catch(e) {}
    }
    if (state.mode === 4) speakPodcast(state.podcastIndex);
    else speakNext();
  }
});

// Safe area
function probeSafeArea() {
  try {
    const probe = document.getElementById('safeProbe');
    const r = probe.getBoundingClientRect();
    layout.safeBottom = Math.max(0, r.height - 1);
  } catch(e) {}
}

// Load saved FX
loadFx();
syncSlidersFromState();

// Init
initScene();
probeSafeArea();
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); probeSafeArea(); });
requestAnimationFrame(render);
pwInput.focus();

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    else if (!Array.isArray(r)) r = [0, 0, 0, 0];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// Auto-unlock when loaded inside an iframe (MasterOracle)
if (window.parent !== window) {
  setTimeout(() => {
    try {
      // Just hide the overlay — audio starts on first user interaction within iframe
      const ov = document.getElementById('overlay');
      if (ov) { ov.classList.add('hidden'); setTimeout(() => { ov.style.display = 'none'; }, 600); }
      const fr = document.getElementById('fxRack');
      if (fr) fr.classList.add('show');
      // Resume audio on first click/touch inside the iframe
      document.addEventListener('click', function iframeStart() {
        document.removeEventListener('click', iframeStart);
        try { unlock(); } catch(e) {}
      }, { once: true });
      document.addEventListener('touchstart', function iframeTouchStart() {
        document.removeEventListener('touchstart', iframeTouchStart);
        try { unlock(); } catch(e) {}
      }, { once: true });
    } catch(e) {}
  }, 300);
}
</script>
